services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: quran_tafseer_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tafseer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tafseer_secret}
      POSTGRES_DB: ${POSTGRES_DB:-quran_rag}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tafseer} -d ${POSTGRES_DB:-quran_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgvector_data:
    driver: local
    # Data persists across container restarts and removals.
    # To fully reset: docker compose down -v
